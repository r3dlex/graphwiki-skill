name: Skill Check

on:
  push:
    paths:
      - 'SKILL.md'
      - 'SKILL-*.md'
      - 'src/hooks/skill-generator.ts'
  pull_request:
    paths:
      - 'SKILL.md'
      - 'SKILL-*.md'
      - 'src/hooks/skill-generator.ts'

jobs:
  skill-check:
    name: Verify skill files are up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check skill files match SKILL.md
        run: node --import tsx/esm src/hooks/skill-generator.ts --check
