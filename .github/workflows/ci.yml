name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Force publish even if version already on npm'
        type: boolean
        default: false

jobs:
  archgate:
    name: archgate check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify rule scopes
        run: |
          set -e
          grep "scope: 'src/graph/'" arch/rules/graph.rules.ts
          grep "scope: 'wiki/'" arch/rules/wiki.rules.ts
          grep "scope: 'src/serve/'" arch/rules/serve.rules.ts
          grep "scope: 'src/dedup/'" arch/rules/dedup.rules.ts

      - name: Initialize archgate project
        run: pnpm exec archgate init

      - name: Run archgate check
        run: pnpm exec archgate check --ci

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

  hook-deployment:
    name: Hook Deployment Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Generate skill files
        run: pnpm run generate:skills

      - name: Verify generated files
        run: pnpm run generate:skills --check

      - name: Verify hook scripts exist and are valid ESM
        run: |
          cd scripts && node --input-type=module < graphwiki-pretool.mjs && echo "pretool.mjs: valid ESM" && node --input-type=module < graphwiki-session-start.mjs && echo "session-start.mjs: valid ESM" && node --input-type=module < graphwiki-posttool.mjs && echo "posttool.mjs: valid ESM"

      - name: Simulate PreToolUse hook with snake_case event (Read tool)
        run: |
          echo '{"tool_name":"Read","tool_input":{"file_path":"/src/Auth.ts"},"cwd":".","session_id":"test123"}' | \
          node scripts/graphwiki-pretool.mjs
          echo "PreToolUse Read: OK"

      - name: Simulate PreToolUse hook with snake_case event (Ask tool)
        run: |
          echo '{"tool_name":"Ask","tool_input":{"prompt":"What is authentication?"},"cwd":".","session_id":"test123"}' | \
          node scripts/graphwiki-pretool.mjs
          echo "PreToolUse Ask: OK"

      - name: Simulate PreToolUse hook with snake_case event (Bash tool - skip)
        run: |
          echo '{"tool_name":"Bash","tool_input":{"command":"ls"},"cwd":".","session_id":"test123"}' | \
          node scripts/graphwiki-pretool.mjs
          echo "PreToolUse Bash: OK"

      - name: Simulate hook installation
        run: |
          mkdir -p /tmp/test-hooks
          echo '{"hooks": {"PreToolUse": [{"matcher": "*", "hooks": [{"type": "command", "command": "echo existing"}]}]}}' > /tmp/test-hooks/hooks.json

          node --import tsx -e "
            import { generateHooksJsonEntries } from './src/hooks/skill-generator.ts';
            const entries = JSON.parse(generateHooksJsonEntries());
            // Verify graphwiki entries have correct structure (matcher + hooks array)
            const hasPreToolUse = entries.PreToolUse?.length > 0 && entries.PreToolUse[0].hooks?.[0]?.command?.includes('graphwiki-pretool');
            const hasSessionStart = entries.SessionStart?.length > 0 && entries.SessionStart[0].hooks?.[0]?.command?.includes('graphwiki-session');
            const hasPostToolUse = entries.PostToolUse?.length > 0 && entries.PostToolUse[0].hooks?.[0]?.command?.includes('graphwiki-posttool');
            console.log('Has PreToolUse entry:', !!hasPreToolUse);
            console.log('Has SessionStart entry:', !!hasSessionStart);
            console.log('Has PostToolUse entry:', !!hasPostToolUse);
            if (!hasPreToolUse || !hasSessionStart || !hasPostToolUse) process.exit(1);
            console.log('Hook entries: PASS');
          "

  publish:
    name: Release
    runs-on: ubuntu-latest
    needs: [archgate, test, hook-deployment]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write  # npm OIDC provenance + GitHub Packages GITHUB_TOKEN
      packages: write  # GitHub Packages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Changelog gate
        id: changelog
        run: |
          set -e
          BASE_VERSION=$(node -p "require('./package.json').version")
          ESCAPED_VERSION=$(echo "$BASE_VERSION" | sed 's/\./\\./g')

          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md not found. Add a ## [${BASE_VERSION}] section."
            exit 1
          fi

          if ! grep -qE "^## \[?${ESCAPED_VERSION}\]?" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no section for version ${BASE_VERSION}."
            exit 1
          fi

          # Flag-based awk: skip the section header, capture content until next ## header
          SECTION=$(awk '/^## \[?'"${ESCAPED_VERSION}"'\]?/{found=1; next} /^## /{found=0} found' CHANGELOG.md)
          NON_ALPHA=$(echo "$SECTION" | grep -v "^$" | grep -vE "^- alpha\.[0-9a-f]+:" | head -1 || true)

          if [ -n "$NON_ALPHA" ]; then
            echo "has_stable_entry=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_stable_entry=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No stable changelog content for ${BASE_VERSION} — publishing as alpha"
          fi

      - name: Compute publish version
        id: version
        run: |
          set -e
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          STABLE="${{ steps.changelog.outputs.has_stable_entry }}"

          if [ "$STABLE" = "true" ]; then
            PUBLISH_VERSION="$BASE_VERSION"
          else
            PUBLISH_VERSION="${BASE_VERSION}-alpha.${SHORT_SHA}"
            COMMIT_MSG=$(git log -1 --pretty=%s)
            RELEASE_DATE=$(date +%Y-%m-%d)

            # Prefix env vars (not trailing args) + function replacer prevents $ injection
            BASE_VERSION="$BASE_VERSION" SHORT_SHA="$SHORT_SHA" COMMIT_MSG="$COMMIT_MSG" RELEASE_DATE="$RELEASE_DATE" \
            node -e "
              const fs = require('fs');
              const content = fs.readFileSync('CHANGELOG.md', 'utf8');
              const ver = process.env.BASE_VERSION.replace(/\./g, '\\\\.');
              const regex = new RegExp('(^## \\\\[?' + ver + '\\\\]?[^\\\\n]*)', 'm');
              const entry = '- alpha.' + process.env.SHORT_SHA + ': ' + process.env.COMMIT_MSG + ' (' + process.env.RELEASE_DATE + ')';
              const updated = content.replace(regex, function(match) { return match + '\n' + entry; });
              fs.writeFileSync('CHANGELOG.md', updated);
            "
          fi

          echo "publish_version=$PUBLISH_VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing as: $PUBLISH_VERSION"

      - name: Version guard
        id: guard
        run: |
          PUBLISH_VERSION="${{ steps.version.outputs.publish_version }}"
          PUBLISHED=$(npm view "graphwiki@${PUBLISH_VERSION}" version 2>/dev/null || echo "")
          if [ "$PUBLISH_VERSION" = "$PUBLISHED" ] && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "Version ${PUBLISH_VERSION} already published, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing ${PUBLISH_VERSION}"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mutate package.json version
        if: steps.guard.outputs.skip != 'true'
        id: mutate
        run: |
          set -e
          PUBLISH_VERSION="${{ steps.version.outputs.publish_version }}"
          PUBLISH_VERSION="$PUBLISH_VERSION" node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = process.env.PUBLISH_VERSION;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          if [[ "$PUBLISH_VERSION" == *"-alpha."* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npmjs.com (Option B — OIDC provenance)
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -e
          PUBLISH_VERSION="${{ steps.version.outputs.publish_version }}"
          TAG="${{ steps.mutate.outputs.tag }}"

          # --provenance attaches SLSA attestation via OIDC (id-token: write)
          # Auth: uses NPM_TOKEN if set; otherwise relies on npm Trusted Publishers OIDC
          # One-time setup required on npmjs.com → Settings → Trusted Publishers
          pnpm publish --no-git-checks --tag "$TAG" --provenance || {
            EC=$?
            if npm view "graphwiki@${PUBLISH_VERSION}" version 2>/dev/null | grep -q "${PUBLISH_VERSION}"; then
              echo "::warning::graphwiki@${PUBLISH_VERSION} already on npmjs.com — idempotent success"
              exit 0
            fi
            if [ -z "$NODE_AUTH_TOKEN" ]; then
              echo "::warning::NPM_TOKEN not set and OIDC Trusted Publisher not configured — skipping npmjs.com publish"
              echo "  → One-time setup: npmjs.com → graphwiki → Settings → Trusted Publishers → Add GitHub Actions"
              exit 0
            fi
            exit $EC
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Configure Node.js for GitHub Packages
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish to GitHub Packages (Option A — zero secrets)
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -e
          PUBLISH_VERSION="${{ steps.version.outputs.publish_version }}"
          TAG="${{ steps.mutate.outputs.tag }}"

          # Scope the package name for GitHub Packages (@r3dlex/graphwiki)
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.name = '@r3dlex/graphwiki';
            p.publishConfig = { registry: 'https://npm.pkg.github.com', access: 'public' };
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

          pnpm publish --no-git-checks --tag "$TAG" || {
            EC=$?
            if npm view "@r3dlex/graphwiki@${PUBLISH_VERSION}" --registry https://npm.pkg.github.com version 2>/dev/null | grep -q "${PUBLISH_VERSION}"; then
              echo "::warning::@r3dlex/graphwiki@${PUBLISH_VERSION} already on GitHub Packages — idempotent success"
              exit 0
            fi
            exit $EC
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}