name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  archgate:
    name: archgate check
    runs-on: ubuntu-latest
    working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pre-flight: verify rule scopes
        run: |
          # Assert each .rules.ts scope string matches its filename prefix
          grep "scope: 'src/graph/'" arch/rules/graph.rules.ts || { echo "graph.rules.ts scope mismatch"; exit 1; }
          grep "scope: 'src/wiki/'" arch/rules/wiki.rules.ts || { echo "wiki.rules.ts scope mismatch"; exit 1; }
          grep "scope: 'src/serve/'" arch/rules/serve.rules.ts || { echo "serve.rules.ts scope mismatch"; exit 1; }
          grep "scope: 'src/dedup/'" arch/rules/dedup.rules.ts || { echo "dedup.rules.ts scope mismatch"; exit 1; }

      - name: Install archgate (standalone curl)
        run: |
          for i in 1 2 3; do
            curl -fsSL https://cli.archgate.dev/install-unix | sh && break
            echo "Attempt $i failed, retrying..."
          done
          command -v archgate || { echo "archgate not found after 3 retries"; exit 1; }

      - name: Verify archgate CLI
        run: |
          archgate --version || { echo "archgate version check failed"; exit 1; }
          archgate check --help | grep -q 'config' || { echo "archgate --config not supported"; exit 1; }

      - name: Run archgate check
        run: archgate check --config arch/rules/archgate.config.ts

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit
